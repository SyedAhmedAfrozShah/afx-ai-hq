<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>afx.ai | Visionary Agentic Architecture & Syed Ahmed Afroz Shah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'obsidian': '#030305', 'amber-hologram': '#f59e0b', 'teal-data': '#2dd4bf' },
                    fontFamily: { 'sans': ['Space Grotesk', 'sans-serif'], 'mono': ['JetBrains Mono', 'monospace'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&family=JetBrains+Mono:wght@100;400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #030305; color: #e5e5e5; overflow-x: hidden; font-family: 'Space Grotesk', sans-serif; }
        .holo-glass { background: rgba(10, 10, 15, 0.7); backdrop-filter: blur(35px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .holo-card { background: linear-gradient(145deg, rgba(255,255,255,0.03) 0%, rgba(0,0,0,0.3) 100%); border: 1px solid rgba(245, 158, 11, 0.1); }
        #architect-node { position: fixed; bottom: 40px; right: 40px; width: 420px; z-index: 1000; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .view-hidden { display: none !important; }
    </style>
</head>
<body class="antialiased">

    <!-- Auth & UI (Simplified for Diagnostics) -->
    <div id="home-view" class="p-20 text-center">
        <h1 class="text-6xl font-bold mb-10">afx<span class="text-amber-hologram">.ai</span></h1>
        <button onclick="document.getElementById('architect-node').classList.toggle('hidden')" class="bg-amber-hologram text-black px-10 py-4 rounded-xl font-mono uppercase tracking-widest">Open Terminal</button>
        <p class="mt-10 text-gray-600 font-mono text-xs uppercase tracking-widest">Diagnostic Mode Active</p>
    </div>

    <!-- The Terminal (Focus of the Fix) -->
    <div id="architect-node" class="holo-glass rounded-[40px] flex flex-col overflow-hidden shadow-2xl">
        <div class="bg-black/80 p-6 border-b border-white/10 flex justify-between items-center">
            <h4 class="font-bold text-xs text-white uppercase tracking-[0.3em]">Sentient Architect v2.0</h4>
            <button onclick="document.getElementById('architect-node').classList.add('hidden')"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
        <div class="p-8 font-mono text-[11px] h-[350px] overflow-y-auto no-scrollbar flex flex-col gap-4 bg-obsidian/95 text-amber-hologram" id="agent-log">
            <p class="text-gray-600">> NEURAL_CORE: STANDBY</p>
        </div>
        <div class="p-6 bg-black border-t border-white/10 flex items-center gap-5">
            <span class="text-amber-hologram font-bold">></span>
            <input type="text" id="agent-input" class="bg-transparent border-none w-full text-white font-mono text-xs focus:outline-none uppercase tracking-widest" placeholder="DIRECTIVE..." autocomplete="off">
            <button id="agent-send-btn" class="text-amber-hologram hover:scale-110 transition-transform"><i data-lucide="send" class="w-5 h-5"></i></button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const agentLog = document.getElementById('agent-log');
        const agentInput = document.getElementById('agent-input');
        const agentSendBtn = document.getElementById('agent-send-btn');

        const appendLog = (msg, color = 'text-amber-hologram') => {
            const p = document.createElement('p');
            p.className = color;
            p.textContent = `> ${msg}`;
            agentLog.appendChild(p);
            agentLog.scrollTop = agentLog.scrollHeight;
        };

        const callGemini = async (val) => {
            const KEY = "AIzaSyAhU3M_qLQx8T6S6JWJyGbcd0l0Mj_KPDQ";
            const URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`;
            
            try {
                appendLog("ESTABLISHING_LINK...", "text-teal-data");
                const response = await fetch(URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: val }] }] })
                });

                const data = await response.json();

                if (response.ok) {
                    if (data.candidates && data.candidates[0].content) {
                        return data.candidates[0].content.parts[0].text;
                    }
                    return "ERROR: EMPTY_RESPONSE_FROM_MODEL";
                } else {
                    // This is where we see exactly why it's failing
                    return `CRITICAL_ERROR: ${data.error ? data.error.message : 'Unknown Connection Error'}`;
                }
            } catch (err) {
                return `NETWORK_ERROR: ${err.message}`;
            }
        };

        const handleSend = async () => {
            const val = agentInput.value.trim();
            if (!val) return;
            agentInput.value = '';
            appendLog(val.toUpperCase(), "text-white");

            const response = await callGemini(val);
            appendLog(response);
        };

        agentSendBtn.addEventListener('click', handleSend);
        agentInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
